<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Brand Preview</title>
  <style>
    body { background: #1a1a1a; font-family: sans-serif; padding: 40px; color: #fff; }
    h2 { color: #888; font-size: 0.85rem; letter-spacing: 0.1em; text-transform: uppercase; margin: 32px 0 12px; }
    .icon-box { background: #111; padding: 40px; display: inline-block; border-radius: 16px; }
    .header-box { background: #111; padding: 20px; border-radius: 16px; }
    .header-box img, .header-box object { width: 100%; border-radius: 8px; }
    a { color: #0070f3; font-size: 0.85rem; }
  </style>
</head>
<body>
  <h1 style="color:white;margin-bottom:4px;">AI Commerce Brand Assets</h1>
  <p style="color:#666;font-size:0.9rem;">X (Twitter) icon &amp; header</p>

  <h2>Icon (400×400)</h2>
  <div class="icon-box">
    <img src="/static/brand/icon.svg" width="200" height="200">
  </div>
  <br><br>
  <a href="/static/brand/icon.svg" download="ai-commerce-icon.svg">⬇ Download icon.svg</a>

  <h2>Header (1500×500)</h2>
  <div class="header-box">
    <img src="/static/brand/header.svg" width="100%">
  </div>
  <br>
  <a href="/static/brand/header.svg" download="ai-commerce-header.svg">⬇ Download header.svg</a>
</body>
</html>
