<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0070f3"/>
      <stop offset="100%" style="stop-color:#00d4ff"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bg)" rx="80"/>

  <!-- Glow effect behind -->
  <circle cx="200" cy="200" r="100" fill="#0070f3" opacity="0.08" filter="url(#blur)"/>

  <!-- Hexagon nodes (network effect) -->
  <!-- Center node -->
  <circle cx="200" cy="200" r="22" fill="url(#glow)" opacity="0.9"/>
  <circle cx="200" cy="200" r="16" fill="#0a0a0f"/>
  <circle cx="200" cy="200" r="6" fill="url(#glow)"/>

  <!-- Satellite nodes -->
  <circle cx="200" cy="120" r="10" fill="#0070f3" opacity="0.8"/>
  <circle cx="200" cy="280" r="10" fill="#0070f3" opacity="0.8"/>
  <circle cx="131" cy="160" r="10" fill="#0070f3" opacity="0.8"/>
  <circle cx="269" cy="160" r="10" fill="#0070f3" opacity="0.8"/>
  <circle cx="131" cy="240" r="10" fill="#0070f3" opacity="0.8"/>
  <circle cx="269" cy="240" r="10" fill="#0070f3" opacity="0.8"/>

  <!-- Connection lines -->
  <g stroke="#0070f3" stroke-width="1.5" opacity="0.35">
    <line x1="200" y1="178" x2="200" y2="130"/>
    <line x1="200" y1="222" x2="200" y2="270"/>
    <line x1="183" y1="189" x2="141" y2="165"/>
    <line x1="217" y1="189" x2="259" y2="165"/>
    <line x1="183" y1="211" x2="141" y2="235"/>
    <line x1="217" y1="211" x2="259" y2="235"/>
    <!-- Outer ring connections -->
    <line x1="200" y1="120" x2="131" y2="160"/>
    <line x1="200" y1="120" x2="269" y2="160"/>
    <line x1="131" y1="160" x2="131" y2="240"/>
    <line x1="269" y1="160" x2="269" y2="240"/>
    <line x1="131" y1="240" x2="200" y2="280"/>
    <line x1="269" y1="240" x2="200" y2="280"/>
  </g>

  <!-- "AC" text -->
  <text x="200" y="355" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif"
        font-size="22" font-weight="700" fill="#0070f3" text-anchor="middle" letter-spacing="6" opacity="0.9">
    AI COMMERCE
  </text>
</svg>
