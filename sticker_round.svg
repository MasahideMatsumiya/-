<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#e8f5e9;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#a5d6a7;stop-opacity:1"/>
    </radialGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#2e7d32" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- 外側のリング（ギザギザ） -->
  <circle cx="100" cy="100" r="95" fill="#2e7d32"/>
  <circle cx="100" cy="100" r="88" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- 葉っぱのアクセント -->
  <ellipse cx="100" cy="30" rx="10" ry="16" fill="#388e3c" transform="rotate(-15 100 30)"/>
  <ellipse cx="100" cy="30" rx="10" ry="16" fill="#43a047" transform="rotate(15 100 30)"/>
  <line x1="100" y1="44" x2="100" y2="34" stroke="#1b5e20" stroke-width="1.5"/>

  <!-- メインテキスト：エコ割 -->
  <text x="100" y="98" font-family="'Hiragino Kaku Gothic ProN', 'Meiryo', 'Yu Gothic', sans-serif"
        font-size="38" font-weight="900" text-anchor="middle"
        fill="#1b5e20" letter-spacing="2">エコ割</text>

  <!-- サブテキスト -->
  <text x="100" y="125" font-family="'Hiragino Kaku Gothic ProN', 'Meiryo', 'Yu Gothic', sans-serif"
        font-size="13" font-weight="bold" text-anchor="middle"
        fill="#2e7d32">モリンガミルク</text>

  <!-- 割引率 -->
  <text x="100" y="155" font-family="Arial, Helvetica, sans-serif"
        font-size="28" font-weight="900" text-anchor="middle"
        fill="#e65100">10%OFF</text>

  <!-- 底部テキスト -->
  <text x="100" y="174" font-family="'Hiragino Kaku Gothic ProN', 'Meiryo', 'Yu Gothic', sans-serif"
        font-size="10" text-anchor="middle" fill="#4a4a4a">マイボトル持参で割引</text>

  <!-- エコアイコン（リサイクルマーク風） -->
  <text x="100" y="192" font-family="Arial, Helvetica, sans-serif"
        font-size="11" text-anchor="middle" fill="#2e7d32">♻ ECO DISCOUNT ♻</text>
</svg>
