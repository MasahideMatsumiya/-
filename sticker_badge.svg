<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 120" width="240" height="120">
  <defs>
    <linearGradient id="bgBadge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f1f8e9;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#c8e6c9;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#388e3c;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1b5e20;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- ベース（角丸長方形） -->
  <rect x="2" y="2" width="236" height="116" rx="18" ry="18" fill="#1b5e20"/>
  <rect x="6" y="6" width="228" height="108" rx="15" ry="15" fill="url(#bgBadge)"/>

  <!-- 左側の緑ストライプ -->
  <rect x="6" y="6" width="52" height="108" rx="15" ry="15" fill="url(#accentGrad)"/>
  <rect x="32" y="6" width="26" height="108" fill="url(#accentGrad)"/>

  <!-- 左側アイコン -->
  <!-- 葉っぱ -->
  <ellipse cx="32" cy="46" rx="14" ry="20" fill="#a5d6a7" transform="rotate(-10 32 46)"/>
  <ellipse cx="32" cy="46" rx="14" ry="20" fill="#66bb6a" transform="rotate(10 32 46)"/>
  <line x1="32" y1="65" x2="32" y2="72" stroke="#e8f5e9" stroke-width="2"/>
  <!-- リサイクルマーク -->
  <text x="32" y="90" font-family="Arial" font-size="18" text-anchor="middle" fill="#e8f5e9">♻</text>

  <!-- 右側コンテンツ -->
  <!-- エコ割テキスト -->
  <text x="148" y="42" font-family="'Hiragino Kaku Gothic ProN', 'Meiryo', 'Yu Gothic', sans-serif"
        font-size="30" font-weight="900" text-anchor="middle"
        fill="#1b5e20" letter-spacing="3">エコ割</text>

  <!-- 区切り線 -->
  <line x1="75" y1="52" x2="228" y2="52" stroke="#a5d6a7" stroke-width="1.5"/>

  <!-- モリンガミルク -->
  <text x="148" y="70" font-family="'Hiragino Kaku Gothic ProN', 'Meiryo', 'Yu Gothic', sans-serif"
        font-size="14" font-weight="bold" text-anchor="middle" fill="#2e7d32">モリンガミルク</text>

  <!-- 割引率 -->
  <text x="148" y="100" font-family="Arial, Helvetica, sans-serif"
        font-size="24" font-weight="900" text-anchor="middle" fill="#e65100">10% OFF</text>

  <!-- マイボトル条件 -->
  <text x="148" y="112" font-family="'Hiragino Kaku Gothic ProN', 'Meiryo', 'Yu Gothic', sans-serif"
        font-size="9" text-anchor="middle" fill="#555">※マイボトル・マイカップご持参の方</text>
</svg>
